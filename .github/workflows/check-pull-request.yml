name: Check Pull Request

on:
  schedule:
    - cron: '0 7 * * 1'
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm run build:frontend
          npm run format:check
          npm run lint
          npm test

      - name: Validate build configuration
        run: |
          echo "=== Dockerfile Build Args ==="
          grep -E "^ARG (SERVICE_VERSION|ACCESS_CODE|BACKEND_API_URL|REDIS_HOST|REDIS_PORT|USE_SINGLE_INSTANCE_CACHE|REDIS_TLS)" Dockerfile
          echo ""
          echo "=== Publish Workflow Build Args ==="
          grep -A 15 "build-args:" .github/workflows/publish.yml | grep -E "(BACKEND_API_URL|REDIS_HOST|REDIS_PORT|USE_SINGLE_INSTANCE_CACHE|REDIS_TLS)"
          echo ""
          echo "✓ Build configuration validated"

      - name: Print all environment variables
        run: |
          echo "=== All Environment Variables ==="
          env | sort
          echo ""
          echo "=== GitHub Context ==="
          echo "GITHUB_REF=${{ github.ref }}"
          echo "GITHUB_EVENT_NAME=${{ github.event_name }}"
          echo "GITHUB_ENVIRONMENT=${{ github.environment }}"

      - name: Security audit
        run: npm run security-audit

