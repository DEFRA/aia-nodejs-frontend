name: Publish

on:
  push:
    branches:
      - main
      - development
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - dev
          - tst
          - pre
          - production

env:
  REPOSITORY: aia/web

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/development' && 'dev') || 'tst' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_ENV_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ENV_ACCOUNT }}:role/${{ secrets.AWS_ENV_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate raw tag
        id: raw-tag
        run: |
          echo "raw_tag=$(git describe --always --tags)" >> $GITHUB_OUTPUT

      - name: Generate semantic version tag for main
        id: semver-main
        if: github.ref == 'refs/heads/main'
        run: |
          echo "semver=0.${GITHUB_RUN_NUMBER}.0" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=false
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.REPOSITORY }}
          tags: |
            type=semver,event=tag,priority=900,pattern={{version}},value=${{ steps.raw-tag.outputs.raw_tag }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,priority=800,value=${{ steps.semver-main.outputs.semver }},enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,priority=800,value=${{ steps.raw-tag.outputs.raw_tag }},enable=${{ github.ref == format('refs/heads/{0}', 'development') }}
            type=raw,event=branch,value={{branch}}-{{sha}},enable=${{ startsWith(github.ref, 'refs/heads/F') }}
          labels: |
            org.opencontainers.image.licenses=OGL-UK-3.0

      - name: Validate build inputs
        run: |
          test -n "${{ vars.BACKEND_API_URL }}" || { echo "Missing var: BACKEND_API_URL"; exit 1; }
          test -n "${{ vars.REDIS_HOST }}" || { echo "Missing var: REDIS_HOST"; exit 1; }
          test -n "${{ secrets.ACCESS_CODE }}" || { echo "Missing secret: ACCESS_CODE"; exit 1; }
          test -n "${{ secrets.ACCESS_CODE_HASH }}" || { echo "Missing secret: ACCESS_CODE_HASH"; exit 1; }
          test -n "${{ secrets.JWT_SECRET }}" || { echo "Missing secret: JWT_SECRET"; exit 1; }

      - name: Print resolved non-secret build vars
        run: |
          echo "SERVICE_VERSION=${{ vars.SERVICE_VERSION }}"
          echo "BACKEND_API_URL=${{ vars.BACKEND_API_URL }}"
          echo "FEATURE_SHOW_COST_USAGE=${{ vars.FEATURE_SHOW_COST_USAGE }}"
          echo "FEATURE_SHOW_POLICY_DOCUMENTS=${{ vars.FEATURE_SHOW_POLICY_DOCUMENTS }}"
          echo "REDIS_HOST=${{ vars.REDIS_HOST }}"
          echo "REDIS_PORT=${{ vars.REDIS_PORT || '6379' }}"
          echo "USE_SINGLE_INSTANCE_CACHE=${{ vars.USE_SINGLE_INSTANCE_CACHE || 'true' }}"
          echo "REDIS_TLS=${{ vars.REDIS_TLS || 'true' }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          build-args: |
            GIT_COMMIT=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            BUILD_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            SERVICE_VERSION=${{ vars.SERVICE_VERSION }}            
            BACKEND_API_URL=${{ vars.BACKEND_API_URL }}            
            FEATURE_SHOW_COST_USAGE=${{ vars.FEATURE_SHOW_COST_USAGE }}
            FEATURE_SHOW_POLICY_DOCUMENTS=${{ vars.FEATURE_SHOW_POLICY_DOCUMENTS }}
            REDIS_HOST=${{ vars.REDIS_HOST }}
            REDIS_PORT=${{ vars.REDIS_PORT || '6379' }}
            USE_SINGLE_INSTANCE_CACHE=${{ vars.USE_SINGLE_INSTANCE_CACHE || 'true' }}
            REDIS_TLS=${{ vars.REDIS_TLS || 'true' }}
            ACCESS_CODE=${{ secrets.ACCESS_CODE }}
            ACCESS_CODE_HASH=${{ secrets.ACCESS_CODE_HASH }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Generate job summary
        id: summary
        run: |
          {
            echo "### Docker Image details"
            echo "The tag is **${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}**"
            echo "| Label      | Value |"
            echo "| ---------- | ----- |"
            echo "| created    | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }} |"
            echo "| description| ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.description'] }} |"
            echo "| licenses   | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.licenses'] }} |"
            echo "| revision   | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }} |"
            echo "| source     | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.source'] }} |"
            echo "| title      | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.title'] }} |"
            echo "| url        | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.url'] }} |"
            echo "| version    | ${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }} |"
          } >> $GITHUB_STEP_SUMMARY
