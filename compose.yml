version: '3.4'
services:

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
    networks:
      - app-network

################################################################################

  your-frontend:
    build:
      context: ./
      args:
        - REDIS_HOST=master.pocaiaredsrv001.a7nqn5.euw2.cache.amazonaws.com
        - REDIS_PORT=6379
    ports:
      - '3000:3000'
    links:
      - 'redis:redis'
    depends_on:
      redis:
        condition: service_started
    environment:
      PORT: 3000
      NODE_ENV: development
      REDIS_HOST: master.pocaiaredsrv001.a7nqn5.euw2.cache.amazonaws.com
      REDIS_PORT: 6379
      USE_SINGLE_INSTANCE_CACHE: true
    networks:
      - app-network

  # your-backend:
  #   image: defradigital/your-backend:${YOUR_BACKEND_VERSION:-latest}
  #   ports:
  #     - '3555:3555'
  #   links:
  #     - 'mongodb:mongodb'
  #   depends_on:
  #     mongodb:
  #       condition: service_started
  #   environment:
  #     PORT: 3555
  #     NODE_ENV: development
  #   networks:
  #     - app-network

################################################################################

volumes:
  mongodb-data:

networks:
  app-network:
    driver: bridge
