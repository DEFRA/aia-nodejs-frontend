# To set up SonarCloud, update the properties below with your project details

sonar.projectKey=DEFRA_aia-frontend
sonar.organization=defra

sonar.links.homepage=https://github.com/DEFRA/aia-frontend
sonar.links.ci=https://github.com/DEFRA/aia-frontend/actions
sonar.links.scm=https://github.com/DEFRA/aia-frontend
sonar.links.issue=https://github.com/DEFRA/aia-frontend/issues

sonar.sources=src/
sonar.exclusions=src/**/*.test.js
sonar.tests=src/
sonar.test.inclusions=src/**/*.test.js

sonar.javascript.lcov.reportPaths=./coverage/lcov.info

sonar.cpd.exclusions=src/**/*.test.js
